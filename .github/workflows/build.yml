name: Build GoogleRefreshToken

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows exe
        run: |-
          pyinstaller --onefile --windowed --name "GoogleRefreshToken" --add-data "index.html;." main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoogleRefreshToken-Windows
          path: dist/GoogleRefreshToken.exe

  build-mac-intel:
    runs-on: macos-13  # Intel runner（免费计划排队较慢，耐心等待）
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Mac Intel .app
        run: |-
          pyinstaller --onedir --windowed --name "GoogleRefreshToken" --add-data "index.html:." main.py

      - name: Rename and package
        run: |
          mv "dist/GoogleRefreshToken.app" "dist/GoogleRefreshToken-Intel.app"
          cd dist && zip -r -q GoogleRefreshToken-Intel.app.zip GoogleRefreshToken-Intel.app

      - name: Upload Mac Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoogleRefreshToken-Mac-Intel
          path: dist/GoogleRefreshToken-Intel.app.zip

  build-mac-arm:
    runs-on: macos-14  # M1 runner (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Mac ARM .app
        run: |-
          pyinstaller --onedir --windowed --name "GoogleRefreshToken" --add-data "index.html:." main.py

      - name: Rename and package
        run: |
          mv "dist/GoogleRefreshToken.app" "dist/GoogleRefreshToken-ARM.app"
          cd dist && zip -r -q GoogleRefreshToken-ARM.app.zip GoogleRefreshToken-ARM.app

      - name: Upload Mac ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoogleRefreshToken-Mac-ARM
          path: dist/GoogleRefreshToken-ARM.app.zip